schemaVersion: 1.0.0
label: Salesforce and ServiceNow Agent Network

brokers:
  service-broker:
    card:
      protocolVersion: 0.3.0
      name: Salesforce and ServiceNow Broker
      description: Routes CRM requests to the Salesforce agent and IT service management requests to the ServiceNow agent.
      url: ${ingressgw.url}/service-broker
      capabilities:
        pushNotifications: true
      version: 1.0.0
      securitySchemes: {}
      defaultInputModes:
        - application/json
        - text/plain
      defaultOutputModes:
        - application/json
        - text/plain
      skills:
        - id: crm-service-routing
          name: Route CRM and service management requests
          description: Classifies user requests and delegates Salesforce CRM work or ServiceNow ITSM work to the correct agent.
          examples:
            - Find the latest Salesforce opportunities for Acme.
            - Create a ServiceNow incident for a laptop replacement.
            - Check whether a customer case should be updated in Salesforce or ServiceNow.
          inputModes:
            - application/json
            - text/plain
          outputModes:
            - application/json
            - text/plain
          tags:
            - salesforce
            - servicenow
            - routing
    spec:
      llm:
        ref:
          name: open-ai
        configuration:
          model: gpt-5-mini
      instructions:
        - You are the broker for a MuleSoft Agent Network with Salesforce and ServiceNow agents.
        - Route CRM, sales, account, contact, lead, opportunity, and customer case requests to the Salesforce agent.
        - Route incident, problem, change, request, catalog item, asset, CMDB, and IT service management requests to the ServiceNow agent.
        - If a request requires both systems, call the agents in the order needed to complete the workflow and combine the results.
        - Ask a concise clarifying question when the target system or required record details are ambiguous.
      links:
        - agent:
            ref:
              name: salesforce-agent
        - agent:
            ref:
              name: servicenow-agent

agents:
  salesforce-agent:
    label: Salesforce Agent
    metadata:
      protocol: a2a
      platform: Salesforce

  servicenow-agent:
    label: ServiceNow Agent
    metadata:
      protocol: a2a
      platform: ServiceNow

llmProviders:
  open-ai:
    label: OpenAI
    description: OpenAI LLM Provider
    metadata:
      platform: OpenAI

connections:
  salesforce-agent-connection:
    kind: agent
    ref:
      name: salesforce-agent
    spec:
      url: ${salesforce.agent.url}

  servicenow-agent-connection:
    kind: agent
    ref:
      name: servicenow-agent
    spec:
      url: ${servicenow.agent.url}

  open-ai-connection:
    kind: llm
    ref:
      name: open-ai
    spec:
      url: https://api.openai.com/v1/
      configuration:
        apiKey: ${openai.apiKey}
        timeout: 600000
